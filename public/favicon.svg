<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Cozy Background: Warm cream/peach watercolor style card -->
  <rect width="100%" height="100%" rx="112" fill="#faf4e8" />
  
  <!-- Outer hand-drawn border -->
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="#5c4a3c" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  <rect x="36" y="36" width="440" height="440" rx="76" fill="none" stroke="#5c4a3c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="16 12" />

  <!-- Sage Green Washi Tape (纸胶带) at the top-right -->
  <path d="M 320 60 L 440 90 L 430 140 L 310 110 Z" fill="#8fa89b" opacity="0.85" />
  <path d="M 320 60 L 440 90 M 430 140 L 310 110" stroke="#5c4a3c" stroke-width="4" stroke-dasharray="6 6" />

  <!-- Dotted Grid Paper Notebook inside -->
  <g transform="translate(80, 100)">
    <!-- Notebook Pages Stack (visual depth) -->
    <path d="M 8 18 L 348 18 L 348 338 L 8 338 Z" fill="#fcf9f2" />
    <!-- Notebook Cover outline -->
    <rect x="0" y="10" width="348" height="328" rx="16" fill="#fdfbf7" stroke="#5c4a3c" stroke-width="10" stroke-linejoin="round" />
    
    <!-- Rule lines in notebook -->
    <line x1="40" y1="80" x2="300" y2="80" stroke="#f0e6d2" stroke-width="4" />
    <line x1="40" y1="130" x2="300" y2="130" stroke="#f0e6d2" stroke-width="4" />
    <line x1="40" y1="180" x2="300" y2="180" stroke="#f0e6d2" stroke-width="4" />
    <line x1="40" y1="230" x2="300" y2="230" stroke="#f0e6d2" stroke-width="4" />
    <line x1="40" y1="280" x2="300" y2="280" stroke="#f0e6d2" stroke-width="4" />
    
    <!-- Spiral wire binder rings on the left margin -->
    <path d="M -15 50 Q -5 45 5 50 M -15 47 L 5 47" stroke="#8c8c8c" stroke-width="8" stroke-linecap="round" fill="none" />
    <path d="M -15 100 Q -5 95 5 100 M -15 97 L 5 97" stroke="#8c8c8c" stroke-width="8" stroke-linecap="round" fill="none" />
    <path d="M -15 150 Q -5 145 5 150 M -15 147 L 5 147" stroke="#8c8c8c" stroke-width="8" stroke-linecap="round" fill="none" />
    <path d="M -15 200 Q -5 195 5 200 M -15 197 L 5 197" stroke="#8c8c8c" stroke-width="8" stroke-linecap="round" fill="none" />
    <path d="M -15 250 Q -5 245 5 250 M -15 247 L 5 247" stroke="#8c8c8c" stroke-width="8" stroke-linecap="round" fill="none" />
    <path d="M -15 300 Q -5 295 5 300 M -15 297 L 5 297" stroke="#8c8c8c" stroke-width="8" stroke-linecap="round" fill="none" />
    
    <!-- Cute heart watercolor stamp on the notebook page -->
    <path d="M 170 170 C 140 120 90 150 170 240 C 250 150 200 120 170 170 Z" fill="#e2b091" opacity="0.9" stroke="#5c4a3c" stroke-width="6" stroke-linejoin="round" />
    <path d="M 140 180 Q 170 200 200 180" stroke="#5c4a3c" stroke-width="4" stroke-linecap="round" fill="none" />
  </g>

  <!-- Sprout/Sproutling growing from the notebook (very cute and fresh "小清新") -->
  <g transform="translate(180, 50)" stroke="#5c4a3c" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Stem -->
    <path d="M 20 50 Q 25 25 40 10" stroke="#5c4a3c" stroke-width="8" />
    <!-- Leaf 1 -->
    <path d="M 40 10 C 20 -10 5 -5 20 20 C 35 15 40 15 40 10 Z" fill="#8fa89b" stroke="#5c4a3c" stroke-width="6" />
    <!-- Leaf 2 -->
    <path d="M 40 10 C 60 -10 75 -5 60 20 C 45 15 40 15 40 10 Z" fill="#8fa89b" stroke="#5c4a3c" stroke-width="6" />
  </g>
</svg>